<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Browser Tab Icon -->
    <link
      rel="icon"
      href="https://res.cloudinary.com/dp2h1zqb4/image/upload/v1780496179/e80bed7e-e1a2-4000-801f-c2c21520b65f_mbhmzm.png"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />

    <meta
      name="description"
      content="Advanced Weather Forecast Application"
    />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Weather Forecast</title>

    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }

      #splash img {
        width: 180px;
        height: 180px;
        object-fit: contain;
        animation: pulse 1.8s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.95);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(0.95);
        }
      }
    </style>
  </head>

  <body>
    <!-- Splash Screen -->
    <div id="splash">
      <img
        src="https://res.cloudinary.com/dp2h1zqb4/image/upload/v1780496179/e80bed7e-e1a2-4000-801f-c2c21520b65f_mbhmzm.png"
        alt="Weather Forecast Logo"
      />
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <script>
      window.addEventListener("load", () => {
        const splash = document.getElementById("splash");

        if (splash) {
          splash.style.opacity = "0";

          setTimeout(() => {
            splash.remove();
          }, 400);
        }
      });
    </script>
  </body>
</html>
